name: handelswelt

description: Handelswelt Marketplace App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  firebase_core: ^3.13.0

  firebase_auth: ^5.5.3

  cloud_firestore: ^5.6.7

  firebase_storage: ^12.0.0

  firebase_messaging: ^15.0.0

  flutter_map: ^7.0.2

  latlong2: ^0.9.1

  image_picker: ^1.1.2

  file_picker: ^10.2.0

  http: ^1.2.1

  geolocator: ^14.0.2

  audioplayers: ^6.0.0

  record: ^6.0.0

  permission_handler: ^12.0.1

  crypto: ^3.0.5

  # State Management
  provider: ^6.1.2

  # Bild-Caching (verhindert iOS-Memory-Crash)
  cached_network_image: ^3.4.1

  url_launcher: ^6.3.1

  flutter_facebook_auth: ^7.1.2

  sign_in_with_apple: ^6.1.4

  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/image_neu2.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
